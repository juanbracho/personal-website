<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Juan — Desk site, expanded</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared-data.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="desk-home.jsx"></script>
<script type="text/babel" src="desk-pages.jsx"></script>

<script type="text/babel">
function LiveDesk() {
  const [route, setRoute] = React.useState('');
  const back = () => setRoute('');
  if (route.startsWith('app:')) {
    const id = route.slice(4);
    const app = window.JUAN.apps.find(a => a.id === id);
    return <AppDetail app={app} onBack={back} />;
  }
  if (route.startsWith('article:')) {
    const id = route.slice(8);
    const article = window.JUAN.articles.find(a => a.id === id);
    return <ArticleReader article={article} onBack={back} />;
  }
  if (route === 'about') return <About onBack={back} />;
  if (route === 'shelf') return <Shelf onBack={back} />;
  if (route === 'apps') {
    return <AppDetail app={window.JUAN.apps[0]} onBack={back} />;
  }
  if (route === 'writing') {
    return <ArticleReader article={window.JUAN.articles[0]} onBack={back} />;
  }
  return <DeskHome onOpen={setRoute} />;
}

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="live"
        title="Desk — interactive home"
        subtitle="Drag the cards. Click to flip. Click 'OPEN APP DETAIL' or 'read →' to navigate. Use the top nav to jump anywhere.">
        <DCArtboard id="home" label="01 · Home (live — try dragging cards!)" width={1280} height={1640}>
          <LiveDesk />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="inner"
        title="Inner pages — static previews"
        subtitle="Each page reuses the desk's wood + cream + terracotta language with a different metaphor: open drawer, torn paper, passport, library shelf.">
        <DCArtboard id="kaizen" label="02 · App detail (drawer pulled out)" width={1280} height={1640}>
          <AppDetail app={window.JUAN.apps[0]} onBack={() => {}} />
        </DCArtboard>
        <DCArtboard id="kage" label="03 · App detail · Kage" width={1280} height={1640}>
          <AppDetail app={window.JUAN.apps[1]} onBack={() => {}} />
        </DCArtboard>
        <DCArtboard id="reader" label="04 · Article reader (torn paper)" width={1280} height={1640}>
          <ArticleReader article={window.JUAN.articles[0]} onBack={() => {}} />
        </DCArtboard>
        <DCArtboard id="about" label="05 · About (passport)" width={1280} height={1640}>
          <About onBack={() => {}} />
        </DCArtboard>
        <DCArtboard id="shelf" label="06 · Shelf (library)" width={1280} height={1640}>
          <Shelf onBack={() => {}} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
