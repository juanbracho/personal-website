<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Juan — Personal Site Inspiration</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared-data.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="direction-cuaderno.jsx"></script>
<script type="text/babel" src="direction-atelier.jsx"></script>
<script type="text/babel" src="direction-stack.jsx"></script>
<script type="text/babel" src="direction-desk.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="intro"
        title="Personal site — four directions"
        subtitle="Each artboard is a full home page. Click ⤢ to focus. Pan/zoom the canvas. Pick the one that feels like you — we mix and ship.">
      </DCSection>

      <DCSection
        id="warm"
        title="Warm + personal"
        subtitle="Built around handwritten accents, off-white paper, and lived-in detail.">
        <DCArtboard id="cuaderno" label="01 · Cuaderno — open notebook" width={1280} height={1640}>
          <Cuaderno />
        </DCArtboard>
        <DCArtboard id="atelier" label="02 · Atelier — editorial workshop" width={1280} height={1640}>
          <Atelier />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="modern"
        title="Soft modern + interactive"
        subtitle="Glassy depth, then a fully tactile easter-egg desk.">
        <DCArtboard id="stack" label="03 · Stack — glassy modern" width={1280} height={1640}>
          <Stack />
        </DCArtboard>
        <DCArtboard id="desk" label="04 · Desk — interactive (click cards!)" width={1280} height={1640}>
          <Desk />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
